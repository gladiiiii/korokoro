<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>コロコロ | おとあそび</title>
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="korokoro.css" />
  </head>
  <body class="korokoro-page">
    <main class="app" aria-label="コロコロ">
      <section class="pad-view" aria-label="コロコロ">
        <header class="topbar">
          <a class="icon-button" href="../../" aria-label="アプリ一覧へ戻る">
            <span aria-hidden="true">←</span>
          </a>
          <div>
            <p class="eyebrow">Korokoro</p>
            <h2>コロコロ</h2>
          </div>
          <button class="sound-button" id="soundButton" type="button" aria-pressed="true">Sound On</button>
        </header>

        <section class="pad-shell" aria-label="Sound and vibration pad">
          <div class="pad" id="pad"></div>
        </section>

        <footer class="controlbar">
          <label class="control">
            <span>Feel</span>
            <input id="feelSlider" type="range" min="1" max="5" value="3" />
          </label>
          <label class="control">
            <span>Tone</span>
            <input id="toneSlider" type="range" min="1" max="5" value="3" />
          </label>
          <p class="status" id="statusText" role="status">Ready</p>
        </footer>
      </section>
    </main>

    <script src="korokoro.js"></script>
  </body>
</html>
