<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Korokoro Pad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Korokoro Pad">
      <header class="topbar">
        <div>
          <p class="eyebrow">Korokoro</p>
          <h1>Touch Pad</h1>
        </div>
        <button class="sound-button" id="soundButton" type="button" aria-pressed="true">Sound On</button>
      </header>

      <section class="pad-shell" aria-label="Sound and vibration pad">
        <div class="pad" id="pad"></div>
      </section>

      <footer class="controlbar">
        <label class="control">
          <span>Feel</span>
          <input id="feelSlider" type="range" min="1" max="5" value="3" />
        </label>
        <label class="control">
          <span>Tone</span>
          <input id="toneSlider" type="range" min="1" max="5" value="3" />
        </label>
        <p class="status" id="statusText" role="status">Ready</p>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
