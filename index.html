<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>おとあそび</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="おとあそび">
      <section class="home-view" aria-label="アプリ一覧">
        <header class="home-hero">
          <p class="eyebrow">Sound Apps</p>
          <h1>おとあそび</h1>
        </header>

        <section class="app-grid" aria-label="音アプリ">
          <a class="app-card" href="apps/korokoro/">
            <span class="card-art korokoro-art" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
            <span class="card-copy">
              <strong>コロコロ</strong>
              <small>Touch Pad</small>
            </span>
          </a>

          <a class="app-card" href="apps/nami/">
            <span class="card-art wave-art" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
            <span class="card-copy">
              <strong>なみ</strong>
              <small>Wave Pad</small>
            </span>
          </a>

          <a class="app-card" href="apps/pokopoko/">
            <span class="card-art pop-art" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
            <span class="card-copy">
              <strong>ぽこぽこ</strong>
              <small>Bubble Pad</small>
            </span>
          </a>

          <a class="app-card" href="apps/kirakira/">
            <span class="card-art spark-art" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
            <span class="card-copy">
              <strong>きらきら</strong>
              <small>Sparkle Pad</small>
            </span>
          </a>
        </section>
      </section>
    </main>
  </body>
</html>
